<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ghaya — Employee Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Almarai',sans-serif;background:#FAF6F1;color:#1a1a2e;min-height:100vh}
body.ar{direction:rtl}
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:#1a1a2e;display:flex;flex-direction:column;z-index:100}
body.ar .sidebar{left:auto;right:0}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-circle{width:36px;height:36px;border-radius:50%;background:#E8472A;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.logo-text{font-size:20px;font-weight:800;color:#fff}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:2px}
.emp-badge{margin-top:12px;display:flex;align-items:center;gap:10px}
.emp-avatar{width:38px;height:38px;border-radius:50%;background:#E8472A;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#fff;flex-shrink:0}
.emp-info .emp-name{font-size:13px;font-weight:700;color:#fff}
.emp-info .emp-role{font-size:11px;color:rgba(255,255,255,.4)}
.nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section{padding:8px 20px 4px;font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1.5px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;transition:background .2s;color:rgba(255,255,255,.7);font-size:14px;border-left:3px solid transparent}
body.ar .nav-item{border-left:none;border-right:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(232,71,42,.15);color:#E8472A;border-left-color:#E8472A}
body.ar .nav-item.active{border-left-color:transparent;border-right-color:#E8472A}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.sign-out-btn{width:100%;padding:10px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-family:'Almarai',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.sign-out-btn:hover{background:rgba(232,71,42,.2);color:#E8472A;border-color:#E8472A}
.main{margin-left:240px;min-height:100vh}
body.ar .main{margin-left:0;margin-right:240px}
.topbar{background:#fff;border-bottom:1px solid #e8e0d8;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-size:18px;font-weight:800;color:#1a1a2e}
.page-sub{font-size:12px;color:#888;margin-top:2px}
.lang-toggle{display:flex;border:1px solid #e8e0d8;border-radius:8px;overflow:hidden}
.lang-btn{padding:6px 14px;font-size:12px;font-family:'Almarai',sans-serif;cursor:pointer;border:none;background:#fff;color:#666;font-weight:700;transition:all .2s}
.lang-btn.active{background:#1a1a2e;color:#fff}
.content{padding:32px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e8e0d8;text-align:center}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-label{font-size:11px;color:#888;font-weight:700;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:32px;font-weight:800;color:#1a1a2e;line-height:1}
.section-card{background:#fff;border-radius:12px;border:1px solid #e8e0d8;margin-bottom:24px;overflow:hidden}
.section-header{padding:20px 24px;border-bottom:1px solid #f0ebe4;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.section-title{font-size:15px;font-weight:800;color:#1a1a2e}
.section-sub{font-size:12px;color:#888;margin-top:2px}
.btn{padding:9px 18px;border-radius:8px;font-family:'Almarai',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#E8472A;color:#fff}
.btn-primary:hover{background:#d03d22}
.btn-ghost{background:#f5f0eb;color:#1a1a2e;border:1px solid #e8e0d8}
.btn-ghost:hover{background:#e8e0d8}
.btn-sm{padding:6px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th{padding:10px 20px;text-align:left;font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;border-bottom:1px solid #f0ebe4;white-space:nowrap;background:#faf6f1}
body.ar th{text-align:right}
td{padding:13px 20px;font-size:13px;border-bottom:1px solid #f5f0eb;vertical-align:middle}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#e6f7ee;color:#1a7a42}
.badge-orange{background:#fff3e6;color:#c46a00}
.badge-red{background:#ffeee6;color:#c42a00}
.badge-gray{background:#f0ebe4;color:#666}
.badge-blue{background:#e6f0ff;color:#1a4da0}
.badge-purple{background:#f0ebff;color:#5c35b8}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;padding:4px}
.modal-body{padding:24px}
.modal-footer{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end}
.form-row{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-input{width:100%;padding:10px 14px;border:1px solid #e8e0d8;border-radius:8px;font-family:'Almarai',sans-serif;font-size:14px;color:#1a1a2e;background:#faf6f1;transition:border .2s}
.form-input:focus{outline:none;border-color:#E8472A;background:#fff}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:5px 14px;border-radius:20px;font-family:'Almarai',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #e8e0d8;background:#fff;color:#888;transition:all .2s}
.filter-btn.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.empty{padding:48px 24px;text-align:center;color:#888}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.loading{display:flex;align-items:center;justify-content:center;padding:48px;color:#888;font-size:14px;gap:8px}
.spinner{width:20px;height:20px;border:2px solid #e8e0d8;border-top-color:#E8472A;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#1a7a42}
.toast.error{background:#c42a00}
.balance-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:20px 24px}
.balance-card{background:#faf6f1;border-radius:10px;padding:16px;text-align:center;border:1px solid #f0ebe4}
.balance-num{font-size:28px;font-weight:800;color:#1a1a2e;margin-bottom:4px}
.balance-label{font-size:11px;color:#888;font-weight:700;letter-spacing:.5px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.profile-field{padding:14px 24px;border-bottom:1px solid #f5f0eb}
.profile-field:nth-child(odd){border-right:1px solid #f5f0eb}
.profile-key{font-size:11px;color:#888;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.profile-val{font-size:14px;font-weight:700;color:#1a1a2e}
.eos-scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:20px 24px}
.eos-card{border-radius:12px;padding:20px;text-align:center;border:2px solid transparent}
.eos-card.termination{background:#fff3f0;border-color:#E8472A20}
.eos-card.resignation{background:#f0f4ff;border-color:#1a4da020}
.eos-card-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:8px}
.eos-card-amount{font-size:26px;font-weight:800;margin-bottom:6px}
.eos-card-note{font-size:11px;color:#888;line-height:1.4}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0!important;margin-right:0!important}.stats-grid{grid-template-columns:1fr 1fr}.content{padding:16px}.form-grid{grid-template-columns:1fr}.profile-grid{grid-template-columns:1fr}.eos-scenario-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-row">
      <div class="logo-circle">غ</div>
      <div>
        <div class="logo-text">Ghaya <span style="font-size:13px;opacity:.6">غاية</span></div>
        <div class="logo-sub">EMPLOYEE PORTAL</div>
      </div>
    </div>
    <div class="emp-badge">
      <div class="emp-avatar" id="sidebar-avatar">?</div>
      <div class="emp-info">
        <div class="emp-name" id="sidebar-name">Loading...</div>
        <div class="emp-role">Employee</div>
      </div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-section">OVERVIEW</div>
    <div class="nav-item" onclick="showPage('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span><span>Dashboard</span></div>
    <div class="nav-section" style="margin-top:8px">MY HR</div>
    <div class="nav-item" onclick="showPage('leaves')" id="nav-leaves"><span class="nav-icon">🌴</span><span>My Leaves</span></div>
    <div class="nav-item" onclick="showPage('payslips')" id="nav-payslips"><span class="nav-icon">💰</span><span>My Payslips</span></div>
    <div class="nav-item" onclick="showPage('profile')" id="nav-profile"><span class="nav-icon">👤</span><span>My Profile</span></div>
  </nav>
  <div class="sidebar-footer">
    <button class="sign-out-btn" onclick="logout()">Sign Out ↩</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="page-sub" id="page-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">ع</button>
      </div>
    </div>
  </div>

  <div class="content">
    <!-- DASHBOARD -->
    <div id="page-dashboard" style="display:none">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Basic Salary (KWD)</div><div class="stat-value" id="stat-salary">—</div></div>
        <div class="stat-card"><div class="stat-icon">🌴</div><div class="stat-label">Leave Days Remaining</div><div class="stat-value" id="stat-remaining">—</div></div>
        <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-label">Pending Requests</div><div class="stat-value" id="stat-pending">0</div></div>
      </div>
      <div class="section-card">
        <div class="section-header"><div class="section-title">Recent Leave Requests</div><button class="btn btn-ghost btn-sm" onclick="showPage('leaves')">View All</button></div>
        <div id="recent-leaves-body"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>

    <!-- LEAVES -->
    <div id="page-leaves" style="display:none">
      <div class="section-card" style="margin-bottom:24px;">
        <div class="section-header"><div class="section-title">Leave Balance</div></div>
        <div class="balance-grid">
          <div class="balance-card"><div class="balance-num" id="bal-remaining">—</div><div class="balance-label">Days Remaining</div></div>
          <div class="balance-card"><div class="balance-num" id="bal-taken">—</div><div class="balance-label">Taken This Year</div></div>
          <div class="balance-card"><div class="balance-num" id="bal-pending-days" style="color:#c46a00">0</div><div class="balance-label">Pending Days</div></div>
        </div>
        <div style="padding:0 24px 16px;"><div id="bal-accrual-note" style="font-size:12px;color:#888;text-align:center;"></div></div>
      </div>
      <div class="section-card">
        <div class="section-header">
          <div><div class="section-title">Leave History</div></div>
          <div style="display:flex;gap:8px;align-items:center;">
            <div class="filter-row">
              <button class="
